name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs on the same branch/PR when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: myhub-tui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: myhub-tui/go.mod
          cache-dependency-path: myhub-tui/go.sum
      - name: go mod verify
        run: go mod verify
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race ./...

  build:
    name: build (darwin/arm64)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: myhub-tui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: myhub-tui/go.mod
          cache-dependency-path: myhub-tui/go.sum
      - name: make build
        run: make build
      - name: upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: myhub-binaries-darwin-arm64
          path: |
            bin/myhub-tui
            bin/myhub
          if-no-files-found: error
          retention-days: 14
