name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Go maintenance CLI — verify/compile/stats/trust/manifest/health.
  # Lives at myhub-cli/; produces bin/myhub.
  go-cli:
    name: myhub-cli (go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: myhub-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: myhub-cli/go.mod
          cache-dependency-path: myhub-cli/go.sum
      - name: go mod verify
        run: go mod verify
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race ./...
      - name: go build
        run: go build -o ../bin/myhub ./cmd/myhub
      - name: upload myhub binary
        uses: actions/upload-artifact@v4
        with:
          name: myhub-cli-linux-x64
          path: bin/myhub
          if-no-files-found: error
          retention-days: 14

  # Python TUI — lives at myhub-tui/myhub_tui/, 14 commands, 37 tests.
  # CI runs the pytest suite against a standard CPython; the SSD ships
  # its own python-build-standalone runtime separately (see tooling/).
  python-tui:
    name: myhub-tui (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: myhub-tui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "rich>=13" "prompt-toolkit>=3" "psutil>=5.9" "PyYAML>=6" \
            "pytest>=8"
      - name: pytest
        run: PYTHONPATH=. python -m pytest tests/ -v
      - name: py_compile smoke
        run: python -m compileall -q myhub_tui
