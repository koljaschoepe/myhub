name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: build + package + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: myhub-tui/go.mod
          cache-dependency-path: myhub-tui/go.sum

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        working-directory: myhub-tui
        run: make build

      - name: Regenerate manifest
        env:
          MYHUB_ROOT: ${{ github.workspace }}
        run: ./bin/myhub manifest

      - name: Package release tarball
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL="myhub-${VERSION}-darwin-arm64.tar.gz"

          # Stage the ship-able tree in a temp dir so tar --transform et al.
          # don't interfere with the live checkout.
          STAGE="$(mktemp -d)/myhub"
          mkdir -p "$STAGE"
          for entry in .boot .claude bin content memory docs \
                       LICENSE README.md SPEC.md VERSION manifest.json \
                       tooling/install-go.sh tooling/README.md; do
              if [ -e "$entry" ]; then
                  mkdir -p "$STAGE/$(dirname "$entry")"
                  cp -R "$entry" "$STAGE/$(dirname "$entry")/"
              fi
          done

          # Strip runtime artifacts that accidentally landed in content/ or
          # memory/ during CI — they aren't part of a shipped release.
          rm -f  "$STAGE/memory/compile-state.json" \
                 "$STAGE/memory/config.toml" \
                 "$STAGE/memory/projects.yaml" || true
          find "$STAGE/memory" -mindepth 2 -type f ! -name CLAUDE.md -delete 2>/dev/null || true
          find "$STAGE/content/notes" -mindepth 1 ! -name CLAUDE.md -type f -delete 2>/dev/null || true
          find "$STAGE/content/communication" -mindepth 1 ! -name CLAUDE.md -type f -delete 2>/dev/null || true
          find "$STAGE/content/projects" -mindepth 1 ! -name CLAUDE.md -type f -delete 2>/dev/null || true
          find "$STAGE/content/wiki" -mindepth 2 ! -name CLAUDE.md -type f -delete 2>/dev/null || true
          rm -rf "$STAGE/.claude/projects" "$STAGE/.claude/todos" \
                 "$STAGE/.claude/shell-snapshots" "$STAGE/.claude/statsig" || true

          tar -czf "$TARBALL" -C "$(dirname "$STAGE")" myhub
          ls -lh "$TARBALL"
          shasum -a 256 "$TARBALL" | tee "${TARBALL}.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=${TARBALL}.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.sha256 }}
            manifest.json
          body: |
            ## Install

            1. Plug in an APFS-formatted SSD labelled `myhub` (or any label
               — mount path is auto-detected). Alternatively, any dir works
               for dev.
            2. Download `myhub-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz`
               and the sha256 file. Verify:
               ```
               shasum -a 256 -c myhub-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz.sha256
               ```
            3. Extract to the drive root:
               ```
               tar -xzf myhub-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz -C /Volumes/myhub --strip-components=1
               ```
            4. Clear the quarantine bit (Gatekeeper), since binaries aren't
               notarized yet:
               ```
               xattr -dr com.apple.quarantine /Volumes/myhub
               ```
            5. Double-click `/Volumes/myhub/.boot/install.command`.
            6. Drop the SSD (cmd+E) and plug back in — the TUI greets you.

            See the spec (`SPEC.md` on the drive or in this repo) for the
            full architecture, auth model, and roadmap.
